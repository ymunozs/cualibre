# Construye los instaladores de macOS (.dmg) y Windows (setup .exe).
# Se ejecuta manualmente (Actions → Installers → Run workflow) o al subir un tag v*.
# Los instaladores quedan como "Artifacts" del run; con tag, además como Release.

name: Installers

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build .app + DMG
        run: |
          chmod +x packaging/build_mac.sh
          ./packaging/build_mac.sh "${GITHUB_REF_NAME#v}"
      - uses: actions/upload-artifact@v4
        with:
          name: CUA-LIBRE-Studio-mac
          path: dist/*.dmg

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Dependencies
        run: python -m pip install fastapi uvicorn pymupdf python-docx python-multipart httpx pyinstaller
      - name: PyInstaller
        run: >
          python -m PyInstaller --noconfirm --clean
          --name "CUA-LIBRE Studio"
          --icon packaging/cualibre.ico
          --add-data "frontend;frontend"
          --add-data "MANUAL.md;."
          run.py
      - name: Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $env:CUALIBRE_VERSION = "${{ github.ref_name }}".TrimStart("v")
          if (-not $env:CUALIBRE_VERSION -or $env:CUALIBRE_VERSION -eq "main") { $env:CUALIBRE_VERSION = "1.0" }
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging\windows\cualibre.iss
      - uses: actions/upload-artifact@v4
        with:
          name: CUA-LIBRE-Studio-windows
          path: dist/*-windows-setup.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [mac, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
