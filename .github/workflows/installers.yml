# Construye los instaladores de macOS (.dmg) y Windows (setup .exe).
# Se ejecuta manualmente (Actions → Installers → Run workflow) o al subir un tag v*.
# Los instaladores quedan como "Artifacts" del run; con tag, además como Release.

name: Installers

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  # Solo Apple Silicon (macos-14) queda automático: se probó (v1.7.3,
  # 2026-07-07) que el pool hosted de GitHub para macos-13 (Intel) puede
  # quedar sin capacidad disponible por horas, atascando este job y con
  # él el "release" completo (needs: [mac, windows] espera TODAS las
  # instancias del matrix). El DMG Intel se sigue construyendo — pero
  # localmente en una Mac Intel real con packaging/build_mac.sh — y se
  # sube a mano con `gh release upload` junto a los artefactos de este
  # workflow. Si GitHub restaura capacidad estable de macos-13, se puede
  # volver a añadir aquí como segunda entrada del matrix.
  mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build .app + DMG
        run: |
          chmod +x packaging/build_mac.sh
          ./packaging/build_mac.sh "${GITHUB_REF_NAME#v}"
      - uses: actions/upload-artifact@v4
        with:
          name: CUA-LIBRE-Studio-mac-applesilicon
          path: dist/*.dmg

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Dependencies
        run: python -m pip install fastapi uvicorn pymupdf python-docx python-multipart httpx pyinstaller "spacy>=3.8,<3.9" "numpy==1.26.4" https://github.com/explosion/spacy-models/releases/download/es_core_news_sm-3.8.0/es_core_news_sm-3.8.0-py3-none-any.whl https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl
      - name: PyInstaller
        run: >
          python -m PyInstaller --noconfirm --clean
          --name "CUA-LIBRE Studio"
          --icon packaging/cualibre.ico
          --add-data "frontend;frontend"
          --add-data "MANUAL.md;."
          --add-data "backend/data_nrc_es.json;."
          --collect-all es_core_news_sm
          --collect-all en_core_web_sm
          run.py
      - name: Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $env:CUALIBRE_VERSION = "${{ github.ref_name }}".TrimStart("v")
          if (-not $env:CUALIBRE_VERSION -or $env:CUALIBRE_VERSION -eq "main") { $env:CUALIBRE_VERSION = "1.0" }
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging\windows\cualibre.iss
      - uses: actions/upload-artifact@v4
        with:
          name: CUA-LIBRE-Studio-windows
          path: dist/*-windows-setup.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [mac, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
